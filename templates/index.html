<!DOCTYPE html>
<html>

<head>
    <title>Spam Email Classifier</title>
</head>

<body>

    <h1>Spam Email Classifier</h1>

    <form action="/predict" method="POST">

        <textarea
            name="email"
            rows="10"
            cols="60"
            placeholder="Paste your email here..."

        <br><br>

        <button type="submit">
            Predict

    </form>

</body>
